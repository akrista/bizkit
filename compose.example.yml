name: ${STACK_NAME:-bizkit}
x-logging: &default-logging
  driver: 'json-file'
  options:
    max-size: "50m"
    max-file: "10"
    compress: "true"

x-healthcheck: &default-healthcheck
  interval: 10s
  retries: 3
  timeout: 5s

x-base: &base
  profiles: [ app ]
  env_file:
    - .env
  build:
    context: .
    dockerfile: Dockerfile
    cache_from:
      - 'akrista/bizkit:latest'
    args:
      USER_ID: ${HOST_UID:-1000}
      GROUP_ID: ${HOST_GID:-1000}
  image: 'akrista/bizkit:latest'
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  security_opt:
    - no-new-privileges:true
  volumes:
        - '.:/var/www/html'
  logging: *default-logging
  restart: unless-stopped
# ---------------------------------------------------------------------------
# External networks — create them once, before the first `docker compose up`:
#
#   docker network create proxy    --subnet 10.10.3.0/24 --gateway 10.10.3.1
#   docker network create database --subnet 10.10.4.0/24 --gateway 10.10.4.1
#
# Drop `--subnet` / `--gateway` if you don't need fixed addressing.
# Rename via SERVICE_NETWORK / DATABASE_NETWORK in your .env if the defaults
# (service / database) collide with another stack on the host.
# ---------------------------------------------------------------------------
networks:
  proxy:
    name: ${SERVICE_NETWORK:-service}
    external: true
  database:
    name: ${DATABASE_NETWORK:-database}
    external: true
# volumes:
#   stack-postgis:
#     driver: local
#   stack-mariadb:
#     driver: local
#   stack-valkey:
#     driver: local
#   stack-rustfs:
#     driver: local
# ---------------------------------------------------------------------------
# Resource sizing guide — `deploy.resources.limits` for heavy services
# (databases, cache, S3). Pick the tier that matches your host.
#
#   Tier       cpus    memory   Typical use
#   ---------  ------  -------  -------------------------------------------
#   low-end    0.25    512M     Personal dev, CI runners
#   mid-end    1-2     2-4G     Small prod, staging                (default)
#   high-end   4-8     8-16G    Production, heavy spatial / S3 load
#
# The commented services below use mid-end limits as the baseline. Swap
# the values to retune; treat them as *limits* (not reservations) — they
# protect the host from runaway containers.
# ---------------------------------------------------------------------------
services:
  app:
    <<: *base
    container_name: bizkit-app
    ports:
      - "8000:8000"
    networks:
      - proxy
      - database
    healthcheck:
      test: ["CMD", "curl", "--fail", "--max-time", "10", "localhost:8000/up"]
      <<: *default-healthcheck
    stop_grace_period: 35s
  # horizon:
  #   <<: *base
  #   container_name: bizkit-horizon
  #   environment:
  #     CONTAINER_MODE: horizon
  #   networks:
  #     - database
  scheduler:
    <<: *base
    container_name: bizkit-scheduler
    environment:
      CONTAINER_MODE: scheduler
    networks:
      - database
