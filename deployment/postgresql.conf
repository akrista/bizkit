# Bizkit PostGIS server overrides
#
# Mounted at /etc/postgresql/postgresql.conf and loaded via:
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf
#
# The default postgresql.conf generated by initdb is included first, so we
# only override what we want to change. Adjust to your host capacity:
#
#   Tier       shared_buffers  effective_cache_size  work_mem
#   ---------  --------------  --------------------  --------
#   low-end    256MB           1GB                   8MB
#   mid-end    1GB             3GB                   16MB      <-- defaults
#   high-end   4-8GB           12-24GB               32-64MB

include '/var/lib/postgresql/data/postgresql.conf'

# --- Connections ---
max_connections = 150
superuser_reserved_connections = 3

# --- Memory (mid-end defaults) ---
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 16MB
maintenance_work_mem = 256MB

# --- Write-Ahead Log ---
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB

# --- Planner / Random I/O (NVMe / SSD friendly) ---
random_page_cost = 1.1
effective_io_concurrency = 200

# --- PostGIS: heavier locking for spatial editing ---
max_locks_per_transaction = 256

# --- Logging ---
log_min_duration_statement = 1000
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0
