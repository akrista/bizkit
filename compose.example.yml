name: bizkit
x-logging: &default-logging
  driver: 'json-file'
  options:
    max-size: "50m"
    max-file: "10"
    compress: "true"

x-healthcheck: &default-healthcheck
  interval: 10s
  retries: 3
  timeout: 5s

x-base: &base
  profiles: [ app ]
  env_file:
    - .env
  build:
    context: .
    dockerfile: Dockerfile
    cache_from:
      - 'akrista/bizkit:latest'
    args:
      USER_ID: ${HOST_UID:-1000}
      GROUP_ID: ${HOST_GID:-1000}
  image: 'akrista/bizkit:latest'
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  security_opt:
    - no-new-privileges:true
  networks:
    - stack
  volumes:
    - './storage/app/public:/var/www/html/storage/app/public'
    - './storage/logs:/var/www/html/storage/logs'
  logging: *default-logging
  restart: unless-stopped
networks:
  stack:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
# volumes:
#   stack-pgsql:
#     driver: local
#   stack-redis:
#     driver: local
#   stack-rustfs:
#     driver: local
services:
  app:
    <<: *base
    container_name: bizkit-app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--max-time", "10", "localhost:8000/up"]
      <<: *default-healthcheck
    stop_grace_period: 35s
  horizon:
    <<: *base
    container_name: bizkit-horizon
    environment:
      CONTAINER_MODE: horizon

  scheduler:
    <<: *base
    container_name: bizkit-scheduler
    environment:
      CONTAINER_MODE: scheduler
  # inertia:
  #   <<: *base
  #   container_name: bizkit-inertia
  #   environment:
  #     CONTAINER_MODE: ssr
  reverb:
    <<: *base
    container_name: bizkit-reverb
    ports:
      - "8080:8080"
    environment:
      CONTAINER_MODE: reverb
